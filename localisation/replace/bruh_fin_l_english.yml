  FIN_finnish_march_of_conquest:0 "To The Urals!"
  FIN_finnish_march_of_conquest_desc:0 "For too long we have been on the defensive against [SOU.GetNameDef] and its predecessors. Now is the time to turn the tide and push back the frontiers, liberating our people from [SOU.GetAdjective] oppression, and drive Ivan back over the Urals."
  FIN_join_axis:0 "Finnish Irredentism"
  FIN_join_axis_desc:0 "Despite gaining our independence from the former Russian Empire, there are still lands and people that should rightfully be governed by us but remain trapped under the yoke of our enemies' oppression. We must galvanize our people so that we may carve out a glorious Finnish future alongside the Germans."
