  finland.500.t:0 "The Coming War"
  finland.500.d:0 "We must decide between going it alone, or sacrificing some control for greater assistance.\n\n§RDOES NOT DECLARE WAR§!"
  finland.500.a:0 "Finland will go it alone."
  finland.500.a_desc:0 "Finland will keep the §YLone Wolf§! Spirit"
  finland.500.b:0 "We must join the Axis"
  finland.500.b_desc:0 "Removes the §YLone Wolf Spirit when Finland declares war on the soviets§!, and adds them to the Axis."
  finland.502.t:0 "Public Demands War"
  finland.502.d:0 "The Finnish people wish to join with the Germans against the Soviets, and gain more favorable borders. If we don't join the Germans within 180 days, the public will lose favor with us, and the Soviets may launch a pre-emptive strike."
  finland.502.a:0 "We must make preparations."
  finland.503.t:0 "Public Outcry"
  finland.503.d:0 "The Finnish people are outraged we have not gone to war. The Soviets may launch a pre-emptive strike against us, suspecting we will join the germans anyway."
  finland.503.a:0 "We must make preparations."
  finland.504.t:0 "Soviet Encroachment"
  finland.504.d:0 "The Soviets seem to be posturing on our borders and could attack at any moment."
  finland.504.a:0 "Let them come."
  finland.505.t:0 "Victory In The Winter War"
  finland.505.d:0 "With the end of the war against the wretched Finnish at hands, their industrial heartland now falls in our lap. However, the Finns seem staunchly anti-communist and likely will not labour in their old factories. Comrade Stalin fears sabotage by Finnish wreckers and has decided to move the Finnish industry so that our workers may benefit from the machinery back in the motherland proper."
  finland.505.a:0 "Useful"
  finland.506.t:0 "Sweden Sends Volunteers"
  finland.506.d:0 "The Swedish government has been unwilling to join us in the war against the Soviet Union, but public support among our neighbors is still high, and many volunteers from the other Nordic countries have offered to join our ranks to aid the war effort. Although less than we hoped, at least there is some popular awareness about the threat we are facing."
  finland.506.a:0 "It's the least one would expect."
  finland.507.t:0 "Defeat In The Winter War"
  finland.507.d:0 "With the military situation reaching critical levels beyond our governments capacity, [FIN.GetLeader] has voiced his support of bringing an immediate end to hostilities with the Soviet Union. A diplomatic delegation has been dispatched to Moscow and after we agreed to hand over the regions of Karjala and Salla, as well as caving to their stationing of troops at Hanko Peninsular, the Soviets have agreed to sign a ceasefire agreement with us. While devastating, this defeat is hardly surprising to our people and they hunger for revenge against the invaders."
  finland.507.a:0 "This is not over!"
  finland.508.t:0 "Victory In The Winter War"
  finland.508.d:0 "With threats of foreign intervention in the air and after suffering humiliating defeats at the hands of our forces, the Soviets have sent a peace delegation to Helsinki. Paasikivi has been holding secret meetings with Molotov for a few days now. Since the whole affair is so deeply embarrassing to the [SOV.GetAdjective] government, they have been eager to just rush through the meetings and quickly agreed to a complete withdrawal of their troops back to the pre-war borders. With this news spreading like wildfire, spontaneous celebrations have broken out on the streets. [SOV.GetAdjective] troops have already started to withdraw from our territory, returning in misery to their homes. Similarly, the Swedish Volunteer Division we formed during the war is also disbanding now that their services aren't needed anymore. \n\nThis is certainly a day that will stand as one of pride for our nation!"
  finland.508.a:0 "The wolves will eat well this year"
  
  #### NEWS EVENTS ####
  aat_news.1001.t:0 "The Fall of Moscow"
  aat_news.1001.desc:0 "At dawn today, Finnish Jaegers smashed through hastily erected barriers on the streets of Moscow and small assault detachments fought their way from house to house towards Red Square. \nThick, billowing smoke from the many fires raging in the suburbs could be seen rising into the air as Finnish infantry stormed the Kremlin. Grenades and flamethrowers were reportedly needed to fight stubborn NKVD holdouts intent on defending every inch of the complex. The Russian capital is now in Finnish hands, but has been left a burning ruin. \n\nUnconfirmed reports indicate Lenin's embalmed corpse was safely evacuated east."
  aat_news.1001.a:0 "Is this the end of the Soviet Union?"
  aat_news.1001.b:0 "At last, Moskova is ours!"
  aat_news.1001.c:0 "The fascists must be driven from Moscow!"
  
  aat_news.1002.t:0 "The Fall of Helsinki"
  aat_news.1002.desc:0 "The capital of [FIN.GetName], Helsinki, has been occupied by forces from the Soviet Union. Despite fierce resistance from the Suojeskunta defenders, Soviet troops managed to fight their way into the city after a massive artillery and aerial bombardment.\n\nSporadic gunfire can still be heard and several fires are raging in different parts of the city, but most Finnish forces have already withdrawn, following an order by Mannerheim to conduct guerilla warfare in the forests outside the city, where the terrain is more favourable. Despite Finland choosing to fight on, many doubt how long the small country can hold out with their seat of government occupied."
  aat_news.1002.a:0 "Is this the end of Finland?"
  aat_news.1002.b:0 "At last, Helsinki is ours!"
  aat_news.1002.c:0 "The communists must be driven from Helsinki!"
  
