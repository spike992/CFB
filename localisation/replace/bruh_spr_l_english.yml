  #### EVENTS ####
  lar_spain.39.t:0 "[From.GetNameDefCap] Demands North Africa"
  lar_spain.39.desc:0 "[From.GetAdjective] diplomats have delivered us an ultimatum, demanding we immediately relinquish control over North Africa to [From.GetNameDef]. No doubt they mean to capitalize on the weakness of our current international position..."
  lar_spain.39.a:0 "We can part with just the coast."
  lar_spain.39.b:0 "We cannot afford another war. We must accept."
  lar_spain.39.d:0 "They will not get it so easily!"
  lar_spain.40.t:1 "[From.GetNameDefCap] Accepts Demands"
  lar_spain.40.desc:0 "[From.GetNameDefCap] has accepted our demands and their diplomats assure us they are making arrangements for the transfer of control of North Africa forthwith."
  lar_spain.40.a:0 "Very efficient."
  lar_spain.400.desc:0 "[From.GetNameDefCap] has accepted some of our demands for the control of the Atlantic coast portion of North Africa."
  lar_spain.400.a:0 "We had hoped for more."

  # --- United Kingdom Blockade (654) ---
  lar_spain.654.t:0 "British Embargo"
  lar_spain.654.desc:0 "Intelligence reports from Madrid confirm that the Spanish government has pivoted too far towards the Axis sphere. To ensure our continued trade war with Germany does not get circumvented, the Foreign Office has recommended an immediate cessation of all trade. London will no longer fuel a regime that stands against our interests."
  lar_spain.654.a:0 "Blockade Spain."

  # --- United States Blockade (655) ---
  lar_spain.655.t:0 "American Embargo""
  lar_spain.655.desc:0 "The State Department has officially classified the Spanish state as a hostile state. To preserve the security of the Western Hemisphere and the Atlantic, we must restrict the flow of American resources. Our war materials will only go to those who respect the democratic order."
  lar_spain.655.a:0 "Blockade Spain."

  # --- France Blockade (656) ---
  lar_spain.656.t:0 "French Embargo""
  lar_spain.656.desc:0 "As hostility from our southern neighbor reaches a critical threshold, the French Republic can no longer ignore the threat at our back. Spain will no longer be permitted to trade with us. If Madrid wishes to side with our enemies, they shall do so in total isolation."
  lar_spain.656.a:0 "Blockade Spain."

  # --- Spain Notification (657) ---
  lar_spain.657.t:0 "New BOP level reached"
  lar_spain.657.desc:0 "A new level in the balance of power has been reached. This allows us to send more volunteers, but also may increase allied pressure on our nation."
  lar_spain.657.a:0 "Understood."

  # Asking Germany for Aid
  lar_spain.659.t:0 "Spain Asks for Aid"
  lar_spain.659.desc:0 "The British embargo against Spain has struck the Iberian Peninsula with brutal efficiency. By severing maritime trade routes and cutting off all grain imports, London has intentionally triggered a devastating famine across the country to destabilize the regime. With food reserves empty and starvation threatening total collapse, Madrid has secretly turned to the Reich. They are pleading for immediate shipments of flour, medical supplies, and basic provisions. Defying the democratic blockade to secure our southern flank will cost valuable political and material resources, but leaving a potential ally to starve could permanently compromise our strategic position in Europe."
  lar_spain.659.a:0 "Send aid to Spain."
  lar_spain.659.b:0 "We have nothing to spare."

# Famine Event
  lar_spain.658.t:0 "Famine!"
  lar_spain.658.desc:0 "The outbreak of war with the United Kingdom has brought an immediate and devastating blow to our supply lines. The Royal Navy has successfully locked down the Atlantic and Mediterranean approaches, enforcing a total maritime blockade on all Spanish ports. Every vital grain transport and cargo vessel bound for our shores has been intercepted or turned back. Cut off completely from international markets, our domestic food reserves have instantly collapsed. Bread lines are already forming across our major cities, and the specter of a systemic famine has become an immediate reality. Without a way to break this naval stranglehold or secure emergency relief from abroad, our home front will starve before the war truly begins."
  lar_spain.658.a:0 "God help us."

