  #### IDEAS ####
  SPA_neutrality_idea:0 "Iberian Neutrality"
  POR_neutrality_idea:0 "Not Our War"
  SPR_subjugate_por:0 "Subjugate Portugal"
  SPA_axis_coop:0 "Axis Cooperation"
  SPA_embargo_spirit:0 "The Spanish Embargo"
  SPA_famine0:0 "Apocalyptic Famine"
  SPA_famine0_desc:0 "We have failed. Utterly, completely and totally. We can only pray when the people come to hang us that they do so swiftly and mercilessly."
  SPA_famine1:0 "Severe Famine"
  SPA_famine1_desc:0 "The agricultural heart of Spain has been ripped open. Supply chains are weakened and the population is facing starvation. We wil need continued efforts to prevent a loss of control and this will severely weaken our industrial growth."
  SPA_famine2:0 "Famine"
  SPA_famine2_desc:0 "While the immediate threat of total state collapse is not present, the reality of starvation remains constant. Factories stand idle as workers lack the calories to perform their duties, and the cost of maintaining order in the bread lines is paralyzing our economy."
  SPA_famine3:0 "Moderate Famine"
  SPA_famine3_desc:0 "Rationing is the new normal. The black market the only way many can survive. While we are no longer losing our grip on the streets, the massive diversion of civilian resources to food procurement continues to hinder our industrial growth."
  SPA_famine4:0 "Minor Famine"
  SPA_famine4_desc:0 "The worst of the hunger has been avoided, but the issue remains. Though the fields are still producing, the economy still feels the weight of the Famine. We are fine for now, but the belt must remain tightened."
  SPA_spain_reborn_in_faith:0 "Spain Reborn in Faith"
  SPA_spain_reborn_in_faith_desc:0 "After years of secularist strife and ideological chaos, the nation returns to its spiritual roots. The Church provides the social glue necessary to keep the people focused on reconstruction, reducing the demand for frivolous consumer goods in favor of national sacrifice."
  SPA_most_catholic_monarch:0 "The Most Catholic Monarch"
  SPA_most_catholic_monarch_desc:0 "Reviving the ancient title granted by the Papacy to the Spanish Crown, our Sovereign stands as the premier defender of the Faith. This divine mandate grants the throne unparalleled political authority and allows us to rally the faithful even in non-integrated territories, viewing the struggle as a crusade for the Hispanic world."
  SPA_bolster_trading_fleet:0 "Bolster the Trading Fleet"
  SPA_the_royal_army:0 "The Royal Army"
  SPA_the_royal_army_desc:0 "Purged of republican subversives and revolutionary elements, the military has been reconstituted as a powerful force sworn to the Crown. By restoring the traditional officer hierarchy and emphasizing the soldier's duty to the Monarch rather than a political party, we have forged a military that is as stable as it is competent."
  SPA_rural_foundations_of_spain:0 "Rural Foundations of Spain"
  SPA_rural_foundations_of_spain_desc:0 "Spain is not merely its cities and factories, but the eternal strength of its soil and the peasantry that tends it. By decentralizing our focus and reinforcing the traditional village structures, we make our nation a nightmare for enemy bombers to target effectively. Any invader will find that every hill, farmstead, and valley is defended with the ferocity of a people rooted in their own land."
  SPA_old_order_restored:0 "The Old Order Restored"
  SPA_old_order_restored_desc:0 "The chaotic experiments of the Republic and the revolutionary fervor of the urbanites have been swept away. Spain has returned to the eternal stability of the Old Order. By decentralizing our supply lines and grounding our industry in the resilient countryside, we have become an elusive target for air raids. Our soldiers, fueled by traditionalist zeal and a deep-seated hatred for the godless ideologies of the East, stand ready to defend every core inch of our sacred soil."
  SPA_fight_terror_bombings:0 "Defiance Against Terror Bombings"
   SPA_fight_terror_bombings_desc:0 "The Allied 'Liberators' claim to bring democracy, yet they rain fire upon our homes and churches. By organizing the Civil Defense Corps and publicizing the wreckage of these 'terror-flyers,' we have turned their attempts at intimidation into a rallying cry. Every factory floor rebuilt and every fire extinguished is a victory against foreign barbarism."
  SPA_use_carlit_militias:0 "Mobilize the Requetés"
  SPA_use_carlit_militias_desc:0 "The Carlists are not mere civilian levies, they are disciplined traditionalists fighting for God and King. By incorporating these Requeté units into our front-line command, we gain a bedrock of stability that civilian revolutionaries simply cannot match."
  SPA_revive_carlist_spirit:0 "Revive the Carlist Spirit"
  SPA_revive_carlist_spirit_desc:0 "The ancient cry of 'Dios, Patria y Rey' once again echoes through the mountains of Navarre. We have tapped into the historical fervor of the Carlist Wars, turning our militia units into a crusading force that attacks with the relentless fury of the true faithful."
  SPA_paying_for_guns:0 "Arms Payments"
  SPA_paying_for_guns_desc:0 "Freedom and victory are never free. The equipment we need to win the war must be payed. By diverting a portion of our national treasury and civilian production to pay off these foreign debts, we ensure our international standing remains intact even as the shelves in our shops remain empty."
  SPA_enact_defense_of_spain:0 "The Defense of Spain Act"
  SPA_enact_defense_of_spain_desc:0 "Our shores have historically been our greatest vulnerability. By enacting the Defense of Spain Act, we have authorized a massive public works project to line our beaches and ports with concrete and steel. From the Pyrenees to the Rock of Gibraltar, the coastline is being transformed into a series of interconnected defensive zones designed to break the back of any amphibious assault before it can establish a foothold."
  SPA_utilize_our_veterans:0 "Utilize our Veterans"
  SPA_utilize_our_veterans_desc:0 "The Civil War was a brutal crucible that forged a generation of battle-hardened soldiers. By integrating these veterans into our permanent military structure rather than demobilizing them, we provide the foundational leadership and experience needed to expand our elite formations. Their expertise allows us to field more specialized units like the Legion or mountain divisions than a standard conscript army could support."
  SPA_ejercito_national:0 "Ejército Nacional"
  SPA_ejercito_national_desc:0 "The era of disjointed columns and independent militias is over. By merging the Falangist volunteers, the Requetés, and the regular Army of Africa into the Ejército Nacional, we have created a singular, unified military machine. This centralized command allows for the mass standardization of infantry kit and a renewed focus on doctrine, ensuring our troops spend less time scrounging for supplies and more time holding the line."
  SPA_famine_recovery:0 "Famine Recovery"
  SPA_famine_recovery_desc:0 "The famine is ravaging our countryside, and we must act quickly. By investing in agricultural reforms and rural development, we can restore our food production and ensure that our people are fed as we rebuild our nation."
  SPA_mechanize_the_countryside:0 "Mechanize the Countryside"
  SPA_mechanize_the_countryside_desc:0 "The fields of Spain are the backbone of our nation. By introducing mechanized farming equipment and modern agricultural techniques, we can increase our food production and reduce the strain on our rural population, boosting stability and public confidence."
  SPA_improve_irrigation:0 "Improve Irrigation Systems"
  SPA_improve_irrigation_desc:0 "Water is the lifeblood of our agriculture. By investing in modern irrigation infrastructure, we can increase our food production and reduce the strain on our rural population, allowing them to contribute more effectively to the war effort."
  SPA_keep_tungsten_flowing:0 "Keep the Tungsten Flowing"
  SPA_keep_tungsten_flowing_desc:0 "Tungsten is a critical resource for the Axis armements industry. By securing our supply lines and investing in tungsten mining and processing, we can ensure that the factories have the materials they need to keep producing the weapons of victory."
  SPA_prioritize_industrual_scope:0 "Prioritize Industrial Scope"
  SPA_prioritize_industrual_scope_desc:0 "Our industry is the engine of our war effort. By specializing our steel refineries into producing more of the materials we need most, we can maximize our production efficiency and ensure that our factories are churning out the weapons and equipment we need to win."
  SPA_intel:0 "Royal Intelligence Service"
  Instituto_nacional_de_industria:0 "National Institute of Industry"
  SPA_volunteer_cap:0 "Volunteer Cap"

