l_english:

  #### FOCUSES ####
  SPA_abandon_neutrality:0 "Abandon Neutrality"
  SPA_abandon_neutrality_desc:0 "Spain can't stay neutral, we need to take action!"
  SPA_unite_iberia:0 "Unite Iberia"
  SPA_formalize_axis_entry:0 "Formalize Axis Alliance"
  SPA_formalize_axis_entry_desc:0 "We need to make an alliance with the Axis powers."
  SPA_maintain_neutrality:0 "Maintain Neutrality"
  SPA_maintain_neutrality_desc:0 "We cant afford entry into the devastating world war."
  SPA_iberian_pact:0 "Iberian Pact"
  SPA_iberian_pact_desc:0 "We must make an Iberian pact with portugal to ensure the safety of the region."
  SPA_maintain_neutrality_2:0 "Stay out of the War"
  SPA_the_national_and_popular_army_of_spain:0 "The National and Popular Army of Spain"
  SPA_the_national_and_popular_army_of_spain_desc:0 "The Civil War has fundamentally changed the nature of Spanish warfare. We must now decide whether to maintain the disparate structures of the conflict or forge a new, unified military doctrine for the defense of the Peninsula."
  SPA_lession_from_the_civil_war:0 "Lessons from the Civil War"
  SPA_lession_from_the_civil_war_desc:0 "The battlefields of the Ebro and Madrid were our schoolrooms. We must analyze what worked and what didn't. Before the next great conflict begins."
  SPA_develop_the_fontbernat:0 "Develop the Fontbernat"
  SPA_develop_the_fontbernat_desc:0 "The Fontbernat will prove that Spain can produce its own high quality small arms. We will expand this facility to ensure our infantry never lacks for firepower."
  SPA_expanded_technical_support:0 "Expanded Technical Support"
  SPA_expanded_technical_support_desc:0 "Modern war is won in the workshop as much as the trench. We will integrate technical support companies into every division to keep our equipment in the fight."
  SPA_artillery_modernization:0 "Artillery Modernization"
  SPA_artillery_modernization_desc:0 "Our guns are relics of a bygone era. We will standardize our calibers and adopt modern fire control techniques to ensure our shells find their mark."
  SPA_the_army_of_africa_model:0 "The Army of Africa Model"
  SPA_the_army_of_africa_model_desc:0 "Following the tradition of our most elite units, we will prioritize professionalism, high organization, and aggressive leadership. A small, elite force is worth ten times its weight in conscripts."
  SPA_war_of_the_masses:0 "War of the Masses"
  SPA_war_of_the_masses_desc:0 "Numbers have a quality all their own. We will prepare for a war of attrition, training our population for a total mobilization that will drown any invader in sheer weight of numbers."
  SPA_invest_in_bigger_guns:0 "Invest in Bigger Guns"
  SPA_invest_in_bigger_guns_desc:0 "Against modern armor, our light field pieces are useless. We need heavy anti-tank and long-range howitzers to dominate the battlefield."
  SPA_modernize_infantry:0 "Modernize Infantry"
  SPA_modernize_infantry_desc:0 "From boots to helmets, we will re-equip the rank-and-file with modern gear, improving their stamina and combat effectiveness."
  SPA_utilize_our_veterans_focus:0 "Utilize our Veterans"
  SPA_utilize_our_veterans_focus_desc:0 "The men who survived the Civil War are our greatest resource. They will form the backbone of our new Elite formations."
  SPA_ejercito_national_focus:0 "Ejército Nacional"
  SPA_ejercito_national_focus_desc:0 "The final unification of the Spanish military. A single, fascist command structure for a single, unified Spain."
  SPA_develop_the_Z53:0 "Develop the Z-53"
  SPA_develop_the_Z53_desc:0 "Our infantry forces require a modern, reliable service rifle to replace aging equipment. By funding the development of the Z-53 prototype, our engineers can combine robust manufacturing with high frontline performance. Standardizing this weapon across our divisions will vastly improve our army's general combat effectiveness."
  SPA_improve_special_forces:0 "Improve Special Forces"
  SPA_improve_special_forces_desc:0 "Conventional warfare often hits a stalemate that only specialized, highly trained units can break. We will overhaul the selection process, survival training, and equipment allocation for our elite commando regiments. These upgraded forces will be perfectly optimized for high-risk operations and spearheading critical breakthroughs."
  SPA_connect_our_troops:0 "Connect Our Troops"
  SPA_connect_our_troops_desc:0 "Modern battles move too quickly for runners or paper messages. By investing heavily in field radios and centralized communication hubs, we can link our front line directly to high command. This network ensures rapid tactical adaptability and lightning-fast responses to shifting enemy movements."
  SPA_big_guns:0 "Big Guns"
  SPA_big_guns_desc:0 "To break fortified lines and shatter enemy morale, we must field heavier, harder-hitting ordnance. We will re-engineer our heavy artillery pieces, prioritizing explosive power and maximum operational range. Our batteries will rain down overwhelming destruction, clearing an undisputed path for our infantry."
  SPA_pyrenees_training_academy:0 "Pyrenees Training Academy"
  SPA_pyrenees_training_academy_desc:0 "Our northern border demands specialized soldiers who can fight effortlessly in freezing conditions and rugged terrain. We will establish a premier mountain warfare academy within the rugged peaks of the Pyrenees. Troops trained here will master high-altitude survival and defensive tactics, becoming unmatched guardians of our borders."
  SPA_operational_excercises:0 "Operational Exercises"
  SPA_operational_excercises_desc:0 "Theoretical military doctrine can only take our officer corps so far. By launching large-scale field maneuvers and simulated combat drills, we will test our command structure under realistic pressure. These intensive exercises will expose strategic bottlenecks and sharpen the tactical decision-making of our generals."
  SPA_german_armour_expertise:0 "German Armour Expertise"
  SPA_german_armour_expertise_desc:0 "The German military has revolutionized mobile warfare through their advanced armored doctrines. By inviting their technical advisers and veteran tank commanders to train our crews, we can master the art of coordinated panzer thrusts. This elite instruction will rapidly bring our mechanized divisions up to world-class standards."
  SPA_escuela_verdeja_de_blindados:0 "Escuela Verdeja de Blindados"
  SPA_escuela_verdeja_de_blindados_desc:0 "To establish our own armored tradition, we must formalize the training of our tank corps around domestic design principles. Founding the Escuela Verdeja de Blindados will provide a dedicated academy for armored crew coordination and tactical field deployment. This institution ensures our motorized and armored forces operate with maximum efficiency."
  SPA_establish_cordoba_factory:0 "Establish Córdoba Factory"
  SPA_establish_cordoba_factory_desc:0 "To support our growing domestic aviation requirements, we must construct a dedicated aerospace facility in Córdoba. This complex will manufacture crucial fuselages and localized spare parts, reducing our reliance on foreign shipping. Securing this manufacturing base anchors our future military aviation independence."
  SPA_axis_air_development:0 "Axis Air Development"
  SPA_axis_air_development_desc:0 "The modern air doctrines and engineering standards of the Axis powers are completely unmatched. By signing joint research treaties, our pilots and engineers can study their advanced aerodynamic breakthroughs. Integrating this foreign expertise will rapidly modernize our air force and assembly lines."
  SPA_utilize_italian_seaplanes:0 "Utilize Italian Seaplanes"
  SPA_utilize_italian_seaplanes_desc:0 "Controlling and scouting our vast coastlines demands specialized aircraft capable of maritime operations. By procuring high-grade Italian seaplanes, we can establish efficient naval reconnaissance networks across the Mediterranean. These versatile planes will monitor enemy naval movements and safeguard our strategic waters."
  SPA_expand_hispano_suiza:0 "Expand Hispano-Suiza"
  SPA_expand_hispano_suiza_desc:0 "Hispano-Suiza represents the crown jewel of our domestic automotive and aviation engineering history. The state will inject massive capital to construct new workshops, expand assembly halls, and hire top-tier technicians. This expansion ensures a steady supply of high-performance engines for our frontline aircraft."

  SPA_verdaja_developlment:0 "Verdaja Development"
  SPA_unleash_the_verdeja_2:0 "Upgrade the Verdeja"
  SPA_seek_foreign_experts:0 "Seek Foreign Experts"
  SPA_seek_foreign_experts_desc:0 "The world is moving faster than we can keep up with. We will invite advisors from the great powers to teach us the secrets of modern combined-arms warfare"
  SPA_an_armored_corps:0 "An Armored Corps"
  SPA_an_armored_corps_desc:0 "The tank is no longer a support weapon for infantry; it is the tip of the spear. We will establish our first dedicated armored formations."
  SPA_motorization:0 "Motorization"
  SPA_motorization_desc:0 "Speed is security. By replacing mules with trucks, we can move our reserves to a breakthrough before the enemy can react."
  SPA_german_technical_mission:0 "German Technical Mission"
  SPA_german_technical_mission_desc:0 "The German 'Condor Legion' brought more than just planes; they brought engineers. We will formalize a mission to bring German industrial standards to Spanish tank factories."
  SPA_copy_italian_designs:0 "Copy Italian Designs"
  SPA_copy_italian_designs_desc:0 "The Italians have mastered the art of the fast, light tank suitable for Mediterranean hill country. We will license their blueprints for our own use."
  SPA_verdaja_development:0 "Verdaja Development"
  SPA_verdaja_development_desc:0 "The Verdaja prototype represents the best of Spanish engineering. We will address the mechanical flaws and bring this indigenous tank into mass production."
  SPA_pivot_into_assault_guns:0 "Pivot into Assault Guns"
  SPA_pivot_into_assault_guns_desc:0 "Turrets are expensive and complex. By mounting heavy guns directly into the chassis, we can field powerful assault guns at a fraction of the cost."
  SPA_continue_panzer2_development:0 "Continue Panzer II Development"
  SPA_continue_panzer2_development_desc:0 "The Panzer II is a reliable workhorse. We will adopt the design and produce it locally in our own factories."
  SPA_mechanize_our_brigades:0 "Mechanize our Brigades"
  SPA_mechanize_our_brigades_desc:0 "Infantry must keep pace with the tanks. We will provide our best divisions with half-tracks and armored transports."
  SPA_develop_armored_cavalry:0 "Develop Armored Cavalry"
  SPA_develop_armored_cavalry_desc:0 "The era of the horse is over, but the mission of the reconnaissance and fast moving shock units is still as relevant as ever."
  SPA_improve_on_our_designs:0 "Improve on our Designs"
  SPA_improve_on_our_designs_desc:0 "We have learned much from our foreign friends and have much to learn. However it is now the time to surpass them with Spanish ingenuity."
  SPA_german_designed_spanish_produced:0 "German Designed, Spanish Produced"
  SPA_german_designed_spanish_produced_desc:0 "The perfect synthesis: German engineering coupled with the growing industrial capacity of a revitalized Spain."
  SPA_defenses_against_strategic_bombing:0 "Defenses Against Strategic Bombing"
  SPA_defenses_against_strategic_bombing_desc:0 "The cities of the future will be targets. We will build the bunkers and AA batteries needed to ensure  Spain remains standing after the raids."
  SPA_expand_the_air_branch:0 "Expand the Air Branch"
  SPA_expand_the_air_branch_desc:0 "Spain's sky must be her own. We will invest heavily in airfields, training programs, and domestic airframes."
  SPA_hunt_the_spitfire:0 "Hunt the Spitfire"
  SPA_hunt_the_spitfire_desc:0 "The British Spitfire is the gold standard of Fighters. We will design a plane specifically meant to catch and kill the best the Allies have to offer."

  # NAVY
  SPA_rebuild_the_armada:0 "Rebuild the Armada"
  SPA_rebuild_the_armada_desc:0 "Once, the oceans bowed to the flag of Spain, and the sun never set upon our empire because our ships secured the waves. After decades of neglect and the fratricidal destruction of the Civil War, we must reclaim our heritage. From the historic shipyards of El Ferrol to the deep water docks of Cartagena, we shall lay down the keels of a new fleet."

  ### CIVIL WAR FOCUSES ###
  SPA_buy_italian_equipment:0 "Buy Italian Equipment"
  SPA_buy_italian_equipment_desc:0 "The Corpo Truppe Volontarie (CTV) has brought more than just men, they have brought the industrial might of Fascist Italy. By formally purchasing surplus Italian hardware, we can keep up the fight while attrition is draining our enemies."

  SPA_learn_from_the_battlefield:0 "Lessons from the Battlefield"
  SPA_learn_from_the_battlefield_desc:0 "The Spanish Civil War has become a laboratory for the next great global conflict. From the devastating effectiveness of the Ju 87 Stuka to the logistical challenges of the Ebro, our high command must meticulously analyze every engagement. By absorbing the tactical innovations of our foreign volunteers, we ensure our officer corps is ready for the era of industrialized, combined-arms warfare."

  ### CARLIST SPAIN ###
  SPA_unite_the_crowns_once_more:0 "Unite the Crowns Once More"
  SPA_unite_the_crowns_once_more_desc:0 "The division of the Spanish monarchy was a wound that allowed the rot of liberalism to enter our nation. By reconciling the disparate dynastic claims and uniting the crowns, we restore the singular, absolute authority required to lead Iberia through the coming storm."
  SPA_spirit_of_the_reconquista:0 "Spirit of the Reconquista"
  SPA_spirit_of_the_reconquista_desc:0 "Our history is defined by the long struggle to reclaim our land from those who would erase our faith. We will channel the same spirit that drove the Cid, turning our modern struggle into a holy mission to purge all of Europe of godless ideologies."
  Defenders_of_Catholicism:0 "Defenders of Catholicism"
  Defenders_of_Catholicism_desc:0 "Spain has always been the sword and shield of the Church. We will formalize this role, ensuring that our state policies and our military actions are always in service of the Holy Mother Church, securing the blessings of the Papacy for our cause."
  SPA_launch_the_last_crusade:0 "Launch the Last Crusade"
  SPA_launch_the_last_crusade_desc:0 "This is not merely a war of borders, but a war for the soul of man. We call upon all faithful Spaniards to take up arms in one final, glorious crusade to wipe the shadow of Bolshevism and secularism from our sacred soil once and for all."
  SPA_defenders_of_king_and_crown:0 "Defenders of King and Crown"
  SPA_defenders_of_king_and_crown_desc:0 "We will establish a guard force recruited from the most loyal Carlist and Monarchist families. These men are not just soldiers, they are the living embodiment of our loyalty to the throne, sworn to protect the Sovereign with their very lives."
  SPA_prepare_the_faithful_hosts:0 "Prepare the Faithful Hosts"
  SPA_prepare_the_faithful_hosts_desc:0 "The strength of our army lies in its conviction. By embedding chaplains into every union and factory floor, we will ensure loyalty and obedience to the new state."
  SPA_faith_and_labour:0 "Faith and Labour"
  SPA_faith_and_labour_desc:0 "Following the path of Catholic Social Doctrine, we reject both the exploitation of capitalism and the tyranny of communism. We will build a corporate state where the worker and the employer are united by their common faith and their duty to the nation."
  SPA_royal_science_academy:0 "Royal Science Academy"
  SPA_royal_science_academy_desc:0 "True progress is only possible when guided by tradition. We will re-establish the Royal Academies to ensure that our scientific and technical advancements serve the state and the crown, rather than the reckless whims of the 'enlightened' elite."
  SPA_healing_the_wounds_of_war:0 "Healing the Wounds of War"
  SPA_healing_the_wounds_of_war_desc:0 "The civil war was bloody, but necessary. Now, we must turn our hands to the labor of peace. Through charity, reconstruction, and the mercy of the crown, we will bring the misguided back into the national fold and rebuild what was broken."
  SPA_every_village_a_fortress:0 "Every Village a Fortress"
  SPA_every_village_a_fortress_desc:0 "Our strength is in our roots. By fortifying the rural heartlands and training local militias, we ensure that no invader can ever truly occupy Spain. Even if the cities fall, the spirit of resistance will live on in every farmstead and mountain pass."
  SPA_the_old_order_restored:0 "The Old Order Restored"
  SPA_the_old_order_restored_desc:0 "The circle is complete. The revolution has been crushed, the king is on his throne, and the church is in the heart of the people. Spain has returned to the eternal order of things. Stable, devout, and ready to face the world as a unified power."

  SPA_settle_the_succesion_question:0 "Settle the Succession Question"
  SPA_settle_the_succesion_question_desc:0 "The vacancy of the throne is a void that has been filled by temporary men for too long. We must finally resolve the conflicting claims of the Alfonsists and the Carlists, choosing a path that ensures the stability of the realm and the legitimacy of the Crown once and for all."
  SPA_assasinate_franco:0 "Eliminate the Caudillo"
  SPA_assasinate_franco_desc:0 "Francisco Franco was a necessary sword during the war, but he has become an obstacle to the true Restoration. To ensure the King's return, the 'Caudillo' must be removed from the equation. Whether by a tragic 'accident' or a calculated strike, the shadow of the Generalissimo must fall so the Crown can rise."
  SPA_dios_patria_y_rey:0 "Dios, Patria y Rey"
  SPA_dios_patria_y_rey_desc:0 "The ancient triad of the Carlist cause. By enshrining God, Fatherland, and King as the absolute pillars of the Spanish state, we reject the false idols of democracy and totalitarianism alike. Our loyalty is not to a party or a person, but to the eternal soul of Spain."
  SPA_plus_ultra:0 "Plus Ultra"
  SPA_plus_ultra_desc:0 "The motto of our Empire: Further Beyond. We will look past the ruins of the Civil War and the borders of the Peninsula. This focus marks the beginning of a new era of Spanish ambition, where we seek to project our influence and our faith across the seas once more."
  SPA_reconstruction_through_faith:0 "Reconstruction through Faith"
  SPA_reconstruction_through_faith_desc:0 "Concrete and steel can rebuild a city, but only the Church can rebuild a soul. By placing the clergy at the center of our social programs, we ensure that as the smoke clears, the people find solace and purpose in their traditional duties to God and neighbor."
  SPA_restore_the_royal_army:0 "Restore the Royal Army"
  SPA_restore_the_royal_army_desc:0 "The chaotic militias of the war must be professionalized and sworn directly to the Sovereign. By purging the ranks of political ideologues and restoring the traditional officer hierarchy, we forge a Royal Army that is as loyal to the King as it is lethal to his enemies."
  SPA_royal_intelligence_service:0 "Royal Intelligence Service"
  SPA_royal_intelligence_service_desc:0 "In an increasingly unstable world, information is our greatest weapon and our strongest shield. By establishing a centralized intelligence agency directly answerable to the Crown, we can safeguard our national secrets from foreign infiltration. This department will coordinate our domestic security efforts while expanding our eyes and ears across distant borders."
  SPA_share_intelligence:0 "Share Intelligence"
  SPA_share_intelligence_desc:0 "True security cannot be achieved in total isolation, and our allies share the same global threats we face. By opening controlled lines of communication and exchanging critical data with our trusted partners, we can create a united front against espionage. Together, we will track international subversives and predict hostile movements before they materialize on our doorsteps."
  SPA_empower_royal_police:0 "Empower Royal Police"
  SPA_empower_royal_police_desc:0 "Dissidents and foreign agents threaten the very fabric of our society from within our own cities. We must grant our law enforcement agencies the funding, specialized equipment, and legal authority required to maintain absolute public order. Criminals and traitors alike will soon realize that the long arm of the law reaches into every dark corner of the realm."
  SPA_axis_famine_aid:0 "Axis Famine Aid"
  SPA_axis_famine_aid_desc:0 "Our people are suffering from severe shortages, and empty stomachs threaten the stability of the entire nation. By securing critical food shipments and humanitarian relief from the Axis powers, we can alleviate the immediate hunger gripping our cities. This crucial assistance will sustain our populace and ensure that domestic unrest does not undermine our strategic goals."
  SPA_invest_in_air_defense:0 "Invest in Air Defense"
  SPA_invest_in_air_defense_desc:0 "The skies above us are no longer safe, and our industrial centers are vulnerable to devastating enemy bombardments. We must allocate immediate funding and resources toward building a robust network of anti-aircraft emplacements to guard our airspace. By modernizing our flak batteries and early warning systems, we will ensure that any hostile bombers regret crossing our borders."
  SPA_enact_the_defense_of_spain:0 "Enact the Defense of Spain"
  SPA_enact_the_defense_of_spain_desc:0 "With us being at war again we must transform our nation into an impenetrable fortress capable of withstanding foreign aggression. This comprehensive mandate will mobilize our industrial sectors and grant us greater control over our economy. Every citizen will have a role to play in safeguarding our sovereignty against those who wish to see us fall."
  SPA_begin_work_on_alarcon_dam:0 "Begin Work on Alarcón Dam"
  SPA_begin_work_on_alarcon_dam_desc:0 "Taming the upper course of the Júcar River is a necessity for the long-term stability of our agricultural heartlands. By investing in the massive Alarcón Dam project, we can effectively regulate water distribution and secure vital irrigation lines for our eastern farmlands."
  SPA_local_guild_revitalization:0 "Local Guild Revitalization"
  SPA_local_guild_revitalization_desc:0 "Our traditional industrial sectors thrive on localized expertise and centuries of master craftsmanship. By providing direct financial incentives and updating regulatory frameworks, we can breath new life into our local trade guilds. Empowering these independent artisan networks will foster a collaborative environment that accelerates our economic research."


  ### NATIONALIST SPAIN ###
  SPA_utilize_carlist_militias:0 "Mobilize the Requetés"
  SPA_utilize_carlist_militias_desc:0 "The Carlist Requetés are a useful tool in winning this civil war. We shall equip their miltias and intigrate them into our armies, ensuring both loyalty and a capable boost to our war effort."
  SPA_espana_rescatada:0 "España Rescatada"
  SPA_espana_rescatada_desc:0 "Spain has been snatched from the jaws of Bolshevik chaos. We must now proclaim to the world that the crusade was a success—the nation is rescued, the church is restored, and the traditional values of the Hispanidad are once again the law of the land."
  SPA_bar_program:0 "The B.A.R. Program"
  SPA_bar_program_desc:0 "The 'Brigadas de Acción Rápida' program aims to standardize our production lines. This will improve our industrial output and we will be aided in this by our german friends."
  SPA_bring_back_academia:0 "Restore the Academies"
  SPA_bring_back_academia_desc:0 "The war saw our intellectual and military institutions hollowed out. By reopening the traditional military and civil academies, we will educate a new generation of loyalists in the virtues of hierarchy, discipline, and national service."
  SPA_foundation_of_steel_and_iron:0 "Foundation of Steel and Iron"
  SPA_foundation_of_steel_and_iron_desc:0 "A modern nation is built on heavy industry. We will invest heavily in our smelting plants and steel mills, ensuring that Spain no longer needs to beg for the basic materials of war."
  SPA_reconstuccion_nacional:0 "Reconstrucción Nacional"
  SPA_reconstuccion_nacional_desc:0 "The ruins of our cities are a constant reminder of the price of victory. This massive public works program will repair our infrastructure, provide jobs to the veterans, and literally rebuild Spain from the ground up."
  SPA_rearm_the_nation:0 "Rearm the Nation"
  SPA_rearm_the_nation_desc:0 "With our industrial foundation secured, we must turn our focus to the production of high grade weaponry. We will not be caught unprepared when the next global storm reaches our borders."
  SPA_spain_reforged:0 "Spain Reforged"
  SPA_spain_reforged_desc:0 "The trial by fire is over. Out of the anvil of the Civil War, a new, stronger Spain has been forged. Our industry is humming, our people are united, and our sovereignty is unquestioned."
  SPA_army_of_order_and_discipline:0 "Army of Order and Discipline"
  SPA_army_of_order_and_discipline_desc:0 "The military is the guardian of the state. We will institutionalize the strict discipline of the 'Army of Africa' across all branches, ensuring that every soldier is a pillar of order in a world descending into madness."
  SPA_celebrate_our_triumphant_heroes:0 "Celebrate our Triumphant Heroes"
  SPA_celebrate_our_triumphant_heroes_desc:0 "Victory deserves its due. By organizing massive national parades and establishing lifelong benefits for the 'Héroes de la Cruzada,' we cement the military's prestige and ensure the population never forgets who saved the nation."
  SPA_reestablish_the_guarda_nacional:0 "Reestablish the Guarda Nacional"
  SPA_reestablish_the_guarda_nacional_desc:0 "Domestic stability requires a dedicated force capable of maintaining public order. By reforming the Guarda Nacional, we create a reliable paramilitary organization to secure our towns and major transit lines. This specialized force will act as a shield against subversion and ensure local law enforcement remains loyal to the state."
  SPA_electrify_the_spanish_grid:0 "Electrify the Spanish Grid"
  SPA_electrify_the_spanish_grid_desc:0 "Modern industry and urban growth demand a continuous, dependable flow of power. Expanding our electrical infrastructure into the provinces will jumpstart our rural factories and integrate our isolated regions. Bringing the national grid up to date ensures our domestic production can finally keep pace with our grand strategic ambitions."
  SPA_empower_the_regent:0 "Empower the Regent"
  SPA_empower_the_regent_desc:0 "To navigate this time of crisis, the state requires a single, decisive hand at the helm. By expanding the legal authority of the Regent, we bypass parliamentary gridlock and streamline national decision-making. This consolidation of power ensures that executive decrees are executed swiftly and without political interference."
  SPA_invite_foreign_industries:0 "Invite Foreign Industries"
  SPA_invite_foreign_industries_desc:0 "Our domestic markets lack the capital and technical expertise needed for rapid modernization. By offering favorable tariffs and investment incentives, we can attract major international firms to set up operations within our borders. This influx of foreign enterprise will kickstart our industrial growth and create vital jobs."
  SPA_expand_agrarian_cooperation:0 "Expand Agrarian Cooperation"
  SPA_expand_agrarian_cooperation_desc:0 "Fragmented farming communities limit our national food production capacity. By promoting regional agrarian cooperatives, we can help farmers share heavy machinery, pool vital resources, and coordinate crop distribution. This unified approach will stabilize market prices and guarantee food security across our provinces."
  SPA_honour_the_civil_war_veterans:0 "Honour the Civil War Veterans"
  SPA_honour_the_civil_war_veterans_desc:0 "Those who bled to protect our nation must never be forgotten by the state they saved. Establishing dedicated pension programs, medical care initiatives, and public monuments will properly honor our civil war veterans. Their sacrifices will serve as an enduring symbol of loyalty and inspiration for future generations."

  ### SHARED BRANCH ###
  SPA_deploy_the_auxiliary_force:0 "Deploy the Auxiliary Force"
  SPA_deploy_the_auxiliary_force_desc:0 "Our regular army must remain focused on the front lines and the borders. To secure the rear and maintain order in the newly rescued territories, we will mobilize the auxiliary paramilitary units. These loyal guardians will ensure that any remnants of revolutionary subversion are dealt with swiftly, allowing the regular Ejército Nacional to operate without distraction."
  SPA_fight_the_terror_bombings:0 "Defy the Terror Bombings"
  SPA_fight_the_terror_bombings_desc:0 "The so called 'liberators' from the West seek to break the spirit of Spain by raining fire upon our civilian centers. We will turn their cruelty against them. By organizing robust civil defense networks and showcasing the wreckage of their 'terror-flyers,' we transform every air raid into a catalyst for national resolve and a recruitment drive for our cause."
  SPA_axis_intellectual_aid:0 "Axis Intellectual Aid"
  SPA_axis_intellectual_aid_desc:0 "The struggle for Spain was not merely won with rifles, but with ideas. To ensure the 'liberal rot' never returns to our institutions, we will welcome academic advisors and ideological specialists from our friends in Berlin and Rome. Together, we will reform our educational system to emphasize the values of hierarchy, faith, and the glory of the New Europe."
  SPA_a_war_of_grain:0 "A War of Grain"
  SPA_a_war_of_grain_desc:0 "Our nation cannot rebuild while our citizens queue for bread rations. We must launch a total state offensive to maximize crop yields, requisitioning idle machinery and fixing domestic grain prices. This economic campaign will treat the food crisis with the same urgency as an enemy invasion."
  SPA_promote_rural_resettlement:0 "Promote Rural Resettlement"
  SPA_promote_rural_resettlement_desc:0 "Overcrowded cities strain our infrastructure while vital agrarian lands lie empty and untended. By offering state-backed land grants and financial incentives, we will encourage urban families to relocate to the countryside. This resettlement will revive depopulated regions and secure a steady agricultural labor force."
  SPA_expand_regional_farms:0 "Expand Regional Farms"
  SPA_expand_regional_farms_desc:0 "Small, isolated farming plots are inefficient and struggle to meet national food demands. The state will fund the expansion of regional farming centers, merging smaller plots to streamline large-scale cultivation. This coordination will maximize our provincial output and ensure consistent supply lines."
  SPA_improve_irrigation_throughout_spain:0 "Improve Irrigation Throughout Spain"
  SPA_improve_irrigation_throughout_spain_desc:0 "Arid climates and erratic seasonal rainfall constantly threaten our domestic crop yields. We will invest heavily in a modern network of canals, reservoirs, and automated water distribution systems across our agricultural heartlands. Securing our water supply shields our agrarian sector from devastating natural droughts."
  SPA_agricultural_stability:0 "Agricultural Stability"
  SPA_agricultural_stability_desc:0 "Through rigorous state planning and sweeping infrastructure upgrades, the initial food crisis has finally been averted. Our fields are productive, our supply networks are secure, and market prices have safely leveled out. With a stable food supply achieved, our nation can confidently look toward future growth."
  SPA_nationalize_western_investments:0 "Nationalize Western Investments"
  SPA_nationalize_western_investments_desc:0 "For too long, foreign capitalists have stripped our nation of its natural wealth and resources. By seizing control of all Western-owned assets and infrastructure, we reclaim our economic sovereignty. These vital industries will now serve the interests of our own state rather than foreign bank accounts."
  SPA_instituto_nacional_de_industria:0 "Instituto Nacional de Industria"
  SPA_instituto_nacional_de_industria_desc:0 "Rebuilding our economy requires centralized coordination and state-led development. The creation of the Instituto Nacional de Industria will allow us to directly fund and manage critical industrial sectors. This institutional anchor will drive our production forward and pave the way for total economic autarky."
  SPA_import_axis_industrial_parts:0 "Import Axis Industrial Parts"
  SPA_import_axis_industrial_parts_desc:0 "Our factories are severely bottlenecked by a critical lack of specialized machinery and precision tools. By finalizing trade agreements with the Axis powers, we can import the high-grade industrial components we desperately need. This influx of advanced technology will instantly modernize our production lines."
  SPA_shift_our_industry:0 "Shift Our Industry"
  SPA_shift_our_industry_desc:0 "The threat of global conflict requires our economic engine to adapt to the realities of modern warfare. We must systematically pivot our civilian manufacturing centers toward military production, prioritizing weapons, ammunition, and vehicles. This strategic restructuring ensures our armed forces are fully equipped for any upcoming campaign."
  SPA_las_fortalezas_pirineas:0 "Las Fortalezas Pirineas"
  SPA_las_fortalezas_pirineas_desc:0 "The natural barrier of the Pyrenees offers the ultimate defensive line against continental aggression. By constructing an extensive network of bunkers, artillery positions, and mountain fortifications, we can seal our northern border entirely. No foreign army will pierce this wall without paying a catastrophic price."
  SPA_ecourage_southern_industrialization:0 "Encourage Southern Industrialization"
  SPA_ecourage_southern_industrialization_desc:0 "Our southern provinces hold vast untapped potential and eager labor forces ready to be utilized. The state will subsidize new manufacturing hubs and expand transit links across Andalucia and surrounding regions. Balancing our industrial geography ensures a safer, more resilient economy far from northern threats."
  SPA_prepare_state_arsenals_for_invasion:0 "Prepare State Arsenals for Invasion"
  SPA_prepare_state_arsenals_for_invasion_desc:0 "Peace is a luxury we can no longer assume, and our stockpiles must be ready for total mobilization. Our military depots will be packed to capacity with weaponry, artillery, and vital munitions distributed to strategic frontline sectors. When the storm of war arrives, our soldiers will want for nothing."
  SPA_the_empire_reborn:0 "The Empire Reborn"
  SPA_the_empire_reborn_desc:0 "The era of humiliation and internal division is officially over, Spain stands united and formidable once more. We cast off the shackles of the past to reclaim our rightful status as a dominant global superpower. Our influence will stretch across oceans as we forge a new destiny worthy of our ancestors."
  SPA_small_business_investments:0 "Small Business Investments"
  SPA_small_business_investments_desc:0 "Large industrial conglomerates are not the only backbone of our nation. By providing low-interest state loans and tax breaks to local entrepreneurs, we can stimulate economic activity from the ground up. This injection of capital will revitalize our high streets and ensure steady, localized wealth generation."
  SPA_a_quarry_in_every_state:0 "A Quarry in Every State"
  SPA_a_quarry_in_every_state_desc:0 "Our grand modernization and fortification efforts demand a massive supply of raw building materials. We will systematically survey and open new stone, gravel, and mineral quarries across every province. Securing this localized production ensures our construction projects never stall due to resource shortages."
  SPA_balance_our_economy:0 "Balance Our Economy"
  SPA_balance_our_economy_desc:0 "Unchecked industrial expansion risks runaway inflation and regional economic disparity. We must introduce careful state oversight to stabilize our currency, regulate markets, and balance development between urban factories and rural sectors. A steady, well-regulated economy provides the ultimate foundation for long-term power."
  SPA_keep_workers_in_factories:0 "Keep Workers in Factories"
  SPA_keep_workers_in_factories_desc:0 "Our industrial centers cannot afford a labor shortage during this critical period of reconstruction. The state will issue decrees freezing industrial employment and restricting migration back to rural provinces. Ensuring our skilled workforce remains at their assembly lines guarantees unhindered military and civilian production."
  SPA_divert_agricultural_tools:0 "Divert Agricultural Tools"
  SPA_divert_agricultural_tools_desc:0 "Heavy machinery and metal tools are desperately needed to expand our manufacturing plants and national infrastructure. We will temporarily requisition surplus mechanical equipment and metal implements from the agrarian sector for industrial use. This sacrifice from our fields will rapidly accelerate our factory output."
  SPA_salamanca_tungsten_villages:0 "Salamanca Tungsten Villages"
  SPA_salamanca_tungsten_villages_desc:0 "The rich tungsten deposits in Salamanca are vital for producing high-grade hardened steel and advanced munitions. We will establish dedicated mining settlements directly around these extraction sites to house and support thousands of state laborers. Maximizing this domestic resource ensures our heavy industries remain entirely self-sufficient."
  SPA_espana_en_guerra:0 "Espana en Guerra"


  #### DECISIONS ####
  SPA_civil_war:0 "The Start of the Spanish Civil War"
  SPR_deploy_local_auxiliary_forces:0 "Deploy local auxiliary forces"
  SPR_auxiliary_forces_category:0 "Local Auxiliary Forces"
  SPR_raise_auxiliary_forces_in_state:0 "Raise Auxiliaries in [FROM.GetName]"
  SPR_raise_auxiliary_forces_in_state_desc:0 "The defense of the fatherland begins at home. By mobilizing local veterans and devout volunteers in [FROM.GetName], we can secure our rear lines against paratroopers and naval incursions."
  SPR_disband_auxiliary_forces:0 "Stand Down the Auxiliaries"
  SPR_disband_auxiliary_forces_desc:0 "The war is over. It is time for our volunteers to return to their fields and workshops."
  SPR_disband_auxiliares_tt:0 "All §YAuxiliary Forces§! divisions will be disbanded and their equipment returned to the stockpile."
  SPR_diplomatic_appeasement:0 "Diplomatic Appeasement"
  SPR_diplomatic_appeasement_desc:0 "To keep the Great Powers at bay, we must show a willingness to negotiate. By sending diplomatic missions to the democratic power, we can reassure the Allies of our neutral intentions and reduce the likelihood of escalations."
  SPR_trade_with_allies:0 "Expand Allied Trade"
  SPR_trade_with_allies_desc:0 "Trade has always opened doors and made new friends. Buying Allied goods and raw materials will create a financial entanglement that makes it harder for the democratic powers to justify an embargo or similar hostile action."
  SPR_loosen_press_laws:0 "Loosen Press Restrictions"
  SPR_loosen_press_laws_desc:0 "The international community views our censorship as a sign of totalitarian aggression. By relaxing some of our strict wartime press laws, we can project a more moderate image to the Western public, making it politically difficult for their governments to move against us."
  SPR_reduce_defense_budget:0 "Reduce Defense Spending"
  SPR_reduce_defense_budget_desc:0 "The military is the heart of the state, but its massive budget is a red flag to our neighbors. Temporarily scaling back our rearmament programs will signal our peaceful intent to the world, though it will hinder our rearmament efforts temporarily."
  SPA_buy_panzer_4:0 "Buy the Panzer 4"
  SPR_unlock_verdeja:0 "Unlock the Verdeja"
  SPR_upgrade_verdeja:0 "Upgrade the Verdeja"
  SPA_specialise_steel_refinery_steel:0 "Increase Steel Output"
  SPA_specialise_steel_refinery_aluminium:0 "Increase Aluminum Output"
  SPA_specialise_steel_refinery_tungsten:0 "Increase Tungsten Output"
  SPA_specialise_steel_refinery_chromium:0 "Increase Chromium Output"
  SPR_famine:0 "Worsening Famine"

  SPR_empire_reborn_category:0 "The Empire Reborn"
  # USA
  SPR_USA:0 "Reclaim the American Borderlands"
  SPR_USA_desc:0 "Large swaths of the American South and West were explored and ruled under the flag of Castile. We should attempt to reconquer these now prosperous lands, we will restore our historic frontiers and integrate the populations back into the imperial administration."

 # POR
  SPR_POR:0 "Reclaim the Iberian Throne"
  SPR_POR_desc:0 ""


  # Caribbean
  SPR_caribean:0 "Reassert Control over the Caribbean"
  SPR_caribean_desc:0 "The islands of Cuba, Hispaniola, and Puerto Rico were the very first stepping stones of our empire. Securing these vital sea lanes and bringing the local populations back into our administrative fold secures our dominion over Western trade."

  # Mexico
  SPR_mexico:0 "Reclaim the Viceroyalty of New Spain"
  SPR_mexico_desc:0 "Mexico was once the crown jewel of our global empire. By dismantling its republic and reinstating traditional authorities, we stabilize the region and ensure that its vast resources flow back to the motherland under full imperial compliance."

  # Brazil
  SPR_brazil:0 "Integrate the Brazilian Territories"
  SPR_brazil_desc:0 "During the Iberian Union, the vast wilderness of Brazil fell under the legitimate authority of the Spanish Crown. Reasserting our claim over these lands corrects a historical separation and unifies South America under our leadership."

