  #### NEW ITALY IDEAS ####
  ITA_lib_excav:0 "Libyan Excavation Workers"
  ITA_lib_excav_desc:0 "§RLosing§! coastal Libyan states will lower this modifier by §R2.5%§! until it is removed when Italy owns none of the Libyan Coast. §YRetaking§! Libyan states will restore the modifier by §Y2.5%§! until you own all of the Libyan coast again."
  ITA_loans_2:0 "International Loans"
  ITA_loans_2_desc:0 "Our reproachment with the West has enabled us to once again seek loans from international lenders."
  ITA_loans_1:0 "Fascist Loans"
  ITA_loans_1_desc:0 "Our Fascist brothers in arms are more than willing to fuel our economy as we make ready for the coming conflicts"
  ITA_quick_war:0 "Fast Italian Rearmament"
  ITA_quick_war_desc:0 "It is no great secret that Italy has industrially fallen behind the Great Powers of the World in recent years, if we are to ready for the next conflict we must prioritise a fast rearmament."
  ITA_iri:0 "The Istituto per la Ricostruzione Industriale"
  ITA_iri_desc:0 "The Istituto per la Ricostruzione Industriale has been tasked with increasing the efficiency of our refineries and bringing about a new golden age of Italian Economics."
  ITA_trade_out:0 "Italian Trade Deals"
  ITA_trade_out_desc:0 "Through diplomacy or coercion we've signed a 'mutually' benefiting treaty with Italy, we can only hope this stimulates the economy as promised..."
  ITA_trade_in:0 "Italian Trade Deals"
  ITA_trade_in_desc:0 "Through shrewd diplomacy and force of arms, we've made a number of favourable trade deals that are undoubtly stimulating our economy."
  ITA_yugo_friend:0 "Yugoslavian Guest Workers"
  ITA_yugo_friend_desc:0 "Yugoslavia has seen the light of fascism, as such we hold them as close a friend as any."
  ITA_volunteers_SPR:0 "Aviazione Legionaria"
  ITA_volunteers_SPR_desc:1 "Securing Air Superiority is vital for any army to gain the upper hand and push the enemy back."
